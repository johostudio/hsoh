<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSOH - Music Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav>
            <div class="nav-container">
                <a href="index.html" class="nav-brand">HSOH</a>
                <div class="nav-links">
                    <a href="portfolio.html" class="nav-link active">PORTFOLIO</a>
                    <a href="stats.html" class="nav-link">STATS</a>
                    <a href="recommendations.html" class="nav-link">RECOMMENDATIONS</a>
                </div>
            </div>
        </nav>

        <!-- Page Header -->
        <header>
            <h1>MUSIC PORTFOLIO</h1>
            <p class="tagline">LINKS, VIDEOS</p>
        </header>

        <!-- Music Platforms Section -->
        <section class="music-platforms">
            <h2>PLATFORMS:</h2>
            <div class="platform-links">
                <a href="https://open.spotify.com" target="_blank" class="platform-btn">SPOTIFY</a>
                <a href="https://music.apple.com" target="_blank" class="platform-btn">APPLE MUSIC</a>
                <a href="https://soundcloud.com" target="_blank" class="platform-btn">SOUNDCLOUD</a>
                <a href="https://www.youtube.com" target="_blank" class="platform-btn">YOUTUBE</a>
                <a href="https://www.last.fm" target="_blank" class="platform-btn">LAST.FM</a>
            </div>
        </section>

        <!-- Video Showcase Section -->
        <section class="video-showcase">
            <h2>FEATURED VIDEOS:</h2>
            <div class="video-grid">
                <div class="video-container">
                    <iframe
                        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
                        title="Video 1"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>
                </div>
                <div class="video-container">
                    <iframe
                        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
                        title="Video 2"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <p>HSOH, CONTACT</p>
        </footer>
    </div>
